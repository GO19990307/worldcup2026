function renderTable(){

    const tbody = document.getElementById("scheduleBody");

    const keyword =
        document.getElementById("searchBox")
        .value
        .toLowerCase();

    const group =
        document.getElementById("groupFilter")
        .value;

    const round =
        document.getElementById("roundFilter")
        .value;

    tbody.innerHTML = "";

    matches.forEach(match => {

        const [
            datetime,
            stage,
            groupName,
            roundNo,
            card,
            japan
        ] = match;

        const hitKeyword =
            card.toLowerCase().includes(keyword);

        const hitGroup =
            !group || groupName === group;

        const hitRound =
            !round || stage === round;

        if(
            hitKeyword &&
            hitGroup &&
            hitRound
        ){

            const tr =
                document.createElement("tr");

            if(japan){
                tr.classList.add("japan");
            }

            tr.innerHTML = `
                <td>${datetime}</td>
                <td>${stage}</td>
                <td>${groupName}</td>
                <td>${roundNo}</td>
                <td>${card}</td>
            `;

            tbody.appendChild(tr);

        }

    });

}

.getElementById("searchBox")
.addEventListener(
    "input",
    renderTable
);

.getElementById("groupFilter")
.addEventListener(
    "change",
    renderTable
);

document
.getElementById("roundFilter")
.addEventListener(
    "change",
    renderTable
);

renderTable();
